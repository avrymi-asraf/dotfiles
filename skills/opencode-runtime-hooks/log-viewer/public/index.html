<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent System Logs</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #0d1117; 
            color: #c9d1d9; 
            margin: 0; 
            padding: 30px 40px; 
        }
        h1 { 
            font-weight: 600; 
            color: #ffffff; 
            margin-bottom: 20px;
        }
        .controls {
            margin-bottom: 20px;
            display: flex;
            gap: 15px;
            align-items: center;
        }
        select {
            padding: 10px 14px;
            border-radius: 6px;
            background-color: #161b22;
            border: 1px solid #30363d;
            color: #c9d1d9;
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            cursor: pointer;
            outline: none;
            transition: border-color 0.2s;
        }
        select:focus { border-color: #58a6ff; }
        
        #logs-container {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .log-row {
            background-color: #161b22;
            border: 1px solid #21262d;
            border-radius: 6px;
            overflow: hidden;
            outline: none;
            transition: border-color 0.1s;
        }
        
        .log-row:focus, .log-row:focus-within {
            border-color: #58a6ff;
            box-shadow: 0 0 0 1px #58a6ff;
        }

        .log-header {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            cursor: pointer;
            gap: 16px;
            user-select: none;
        }
        
        .log-row.expanded .log-header {
            border-bottom: 1px solid #21262d;
            background-color: #1f242c;
        }

        .log-header:hover { background-color: #1f242c; }

        .chevron {
            font-size: 10px;
            transition: transform 0.2s;
            color: #8b949e;
            display: inline-block;
            width: 12px;
            text-align: center;
        }
        .log-row.expanded .chevron { transform: rotate(90deg); color: #c9d1d9; }

        .type-badge {
            font-size: 12px;
            font-weight: 600;
            padding: 3px 8px;
            border-radius: 4px;
            background-color: #233a4d;
            color: #79c0ff;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            white-space: nowrap;
        }
        
        .type-badge.event { background-color: #1e3a29; color: #56d364; }
        .type-badge.error { background-color: #4a1f24; color: #f85149; }
        .type-badge.request { background-color: #31215c; color: #d2a8ff; }

        .summary-text {
            font-family: 'Fira Code', monospace;
            font-size: 13px;
            color: #8b949e;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            flex-grow: 1;
        }

        .timestamp {
            font-size: 12px;
            color: #8b949e;
            font-family: 'Fira Code', monospace;
            white-space: nowrap;
        }

        .log-body {
            display: none;
            padding: 16px;
            background-color: #010409;
        }
        .log-row.expanded .log-body { display: block; }
        
        pre { 
            margin: 0;
            font-family: 'Fira Code', monospace;
            font-size: 13px;
            color: #c9d1d9;
            white-space: pre-wrap; 
            word-wrap: break-word; 
            line-height: 1.5;
        }
        
        .loading-error { color: #d29922; font-size: 14px; padding: 20px; text-align: center;}
        
        .help-text {
            font-size: 13px;
            color: #8b949e;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        kbd {
            background-color: #21262d;
            padding: 2px 6px;
            border-radius: 4px;
            font-family: 'Inter', sans-serif;
            font-size: 11px;
            font-weight: 600;
            color: #c9d1d9;
            border: 1px solid #30363d;
            box-shadow: inset 0 -1px 0 #30363d;
        }
    </style>
</head>
<body>
    <h1>🚀 Execution Trace</h1>
    <div class="controls">
        <label for="log-file-select" style="font-size: 14px; font-weight: 500;">Source File:</label>
        <select id="log-file-select" onchange="fetchLogs()">
            <option value="opencode-debug-with-events.jsonl">opencode-debug-with-events.jsonl</option>
            <option value="opencode-debug-no-events.jsonl">opencode-debug-no-events.jsonl</option>
        </select>
    </div>
    
    <div class="help-text">
        <span>Navigation Guide:</span>
        <kbd>↑</kbd> <kbd>↓</kbd> Move
        <kbd>→</kbd> <kbd>←</kbd> Expand/Collapse
        <kbd>Enter</kbd> Toggle
    </div>
    
    <div id="logs-container"><div class="loading-error">Loading logs from server...</div></div>

    <script>
        // Track rendered log rows for keyboard navigation
        let logRows = [];
        
        async function fetchLogs() {
            const fileSelect = document.getElementById('log-file-select').value;
            const container = document.getElementById('logs-container');
            container.innerHTML = '<div class="loading-error">Loading logs from server...</div>';
            logRows = [];
            
            try {
                const response = await fetch('/api/logs?file=' + fileSelect);
                if (!response.ok) {
                    throw new Error(`Server returned ${response.status}`);
                }
                const logs = await response.json();
                renderLogs(logs);
            } catch (error) {
                container.innerHTML = `<div class="loading-error" style="color: #f85149">Error loading logs: ${error.message}</div>`;
            }
        }

        function createRow(timestamp, type, summary, bodyContent, isError = false) {
            const row = document.createElement('div');
            row.className = 'log-row';
            row.tabIndex = 0; // Make focusable
            
            let badgeClass = '';
            if (isError) badgeClass = 'error';
            else if (type.toLowerCase().includes('event') || type.toLowerCase().includes('message')) badgeClass = 'event';
            else if (type.toLowerCase().includes('request') || type.toLowerCase().includes('http')) badgeClass = 'request';
            
            const header = document.createElement('div');
            header.className = 'log-header';
            
            // Format time nicely 
            const timeStr = timestamp ? new Date(timestamp).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit', second:'2-digit', fractionalSecondDigits: 3}) : '';

            header.innerHTML = `
                <span class="chevron">▶</span>
                <span class="type-badge ${badgeClass}">${type}</span>
                <span class="summary-text">${summary}</span>
                <span class="timestamp">${timeStr}</span>
            `;
            
            const body = document.createElement('div');
            body.className = 'log-body';
            
            const pre = document.createElement('pre');
            pre.innerHTML = bodyContent;
            body.appendChild(pre);
            
            row.appendChild(header);
            row.appendChild(body);
            
            header.addEventListener('click', () => {
                row.classList.toggle('expanded');
                row.focus(); 
            });
            
            return row;
        }

        function renderLogs(logs) {
            const container = document.getElementById('logs-container');
            container.innerHTML = ''; 
            logRows = [];

            let groupedText = "";
            let groupMetadata = null;

            const flushGroup = () => {
                if (!groupMetadata) return;
                
                const safeText = groupedText.replace(/</g, "&lt;").replace(/>/g, "&gt;");
                const summary = safeText.substring(0, 100).replace(/\n/g, ' ') + (safeText.length > 100 ? '...' : '');
                
                const row = createRow(
                    groupMetadata.timestamp, 
                    'MESSAGE_DELTA', 
                    '[Aggregated Stream] ' + (summary || '(empty)'),
                    safeText
                );
                
                container.appendChild(row);
                logRows.push(row);
                
                groupedText = "";
                groupMetadata = null;
            };

            for (const log of logs) {
                let isDeltaChunk = false;
                
                // Identify generic chunk deltas safely
                if (!log.error && log.type === 'event' && Array.isArray(log.payload) && log.payload.length > 0) {
                    const evt = log.payload[0]?.event;
                    if (evt?.type === 'message.part.delta') {
                        isDeltaChunk = true;
                        
                        if (!groupMetadata) {
                            groupMetadata = { timestamp: log.timestamp };
                        }
                        
                        const textChunk = evt.properties?.delta || '';
                        groupedText += textChunk;
                    }
                }

                if (!isDeltaChunk) {
                    // It's a new distinct event, flush any accumulated delta text
                    flushGroup();
                    
                    if (log.error) {
                         const row = createRow(
                             log.timestamp, 
                             'PARSE_ERROR', 
                             'Failed to decode log line payload', 
                             log.raw, 
                             true
                         );
                         container.appendChild(row);
                         logRows.push(row);
                    } else {
                         let typeLabel = log.type;
                         let summaryStr = "";
                         
                         if (log.type === 'event' && log.payload?.[0]?.event?.type) {
                             typeLabel = log.payload[0].event.type;
                         }

                         try {
                            // Quick summary for header bar
                            const payloadStr = JSON.stringify(log.payload);
                            summaryStr = payloadStr.substring(0, 120) + (payloadStr.length > 120 ? '...' : '');
                         } catch (e) {
                             summaryStr = "{ ... }";
                         }

                         const safeBodyMap = JSON.stringify(log.payload, null, 2).replace(/</g, "&lt;").replace(/>/g, "&gt;");
                         
                         const row = createRow(
                             log.timestamp,
                             typeLabel,
                             summaryStr,
                             safeBodyMap
                         );
                         container.appendChild(row);
                         logRows.push(row);
                    }
                }
            }
            
            // End of file, flush final group
            flushGroup();

            if (logRows.length === 0) {
                container.innerHTML = '<div class="loading-error" style="color: #8b949e">No log entries found in file.</div>';
            }
        }

        // Global Keyboard Event Listener
        document.addEventListener('keydown', (e) => {
            if (logRows.length === 0) return;
            
            const activeEl = document.activeElement;
            let index = logRows.indexOf(activeEl);

            if (['ArrowDown', 'ArrowUp', 'ArrowRight', 'ArrowLeft'].includes(e.key)) {
                e.preventDefault();
            }

            if (index !== -1) {
                if (e.key === 'ArrowDown' && index < logRows.length - 1) {
                    logRows[index + 1].focus();
                } else if (e.key === 'ArrowUp' && index > 0) {
                    logRows[index - 1].focus();
                } else if (e.key === 'ArrowRight') {
                    activeEl.classList.add('expanded');
                } else if (e.key === 'ArrowLeft') {
                    activeEl.classList.remove('expanded');
                } else if (e.key === 'Enter' || e.key === ' ') {
                    e.preventDefault();
                    activeEl.classList.toggle('expanded');
                }
            } else if (['ArrowDown', 'ArrowRight', 'ArrowLeft'].includes(e.key)) {
                // If focus lost, start from top on navigation attempts
                logRows[0].focus();
            }
        });

        // Initialize loader
        fetchLogs();
    </script>
</body>
</html>
