# Skill symlink map
# Key format: "hostname/user"
# Each location lists which skills to link there. Use "all" to link every skill.
# Paths support ~ and glob patterns (e.g. copilot-chat-*).
# Run `bash update.sh` to apply.

hosts:
  MEWL-5CD4305QXX/user:
    - ~/.claude/skills: [chatreplay, jira-workflow, manage-mcp, manage-skills, scripts]
    - ~/.vscode-server/extensions/github.copilot-chat-*/assets/prompts/skills: [chatreplay, jira-workflow, manage-mcp, manage-skills, scripts]

  # Add more machines below:
  # my-other-machine/alice:
  #   - ~/.claude/skills: all
